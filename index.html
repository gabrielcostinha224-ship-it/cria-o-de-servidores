<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius Vendas | Dashboard</title>
    <style>
        body { background: #0d0d0f; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #16161a; padding: 40px; border-radius: 24px; width: 380px; border: 1px solid #252529; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { color: #00ff6a; font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .status-bar { font-size: 12px; color: #888; margin-bottom: 30px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 12px; border: 1px solid #2a2a2e; background: #09090b; color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #00ff6a; }
        button { width: 100%; padding: 16px; background: #00ff6a; color: #000; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #00d659; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 106, 0.2); }
        #s { margin-top: 20px; font-weight: 500; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SIRIUS VENDAS</div>
        <div class="status-bar">System Control v2.0</div>
        
        <input type="password" id="t" placeholder="Insira o Token do Bot">
        <button onclick="ligar()">ATIVAR SISTEMA</button>
        
        <p id="s"></p>
    </div>

    <script>
        async function ligar() {
            const s = document.getElementById('s');
            const btn = document.querySelector('button');
            
            s.innerText = "⏳ Autenticando com Discord...";
            s.style.color = "#888";
            btn.disabled = true;

            try {
                const res = await fetch('/ligar-bot', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token: document.getElementById('t').value })
                });
                const data = await res.json();
                
                if(data.msg === "OK") {
                    s.innerText = "✅ SISTEMA ONLINE E OPERANTE!";
                    s.style.color = "#00ff6a";
                } else {
                    s.innerText = "❌ ERRO: TOKEN INVÁLIDO";
                    s.style.color = "#ff4444";
                    btn.disabled = false;
                }
            } catch (e) {
                s.innerText = "❌ ERRO NA CONEXÃO";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
